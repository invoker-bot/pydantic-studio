name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked --python ${{ matrix.python-version }}

      - name: Verify uv environment Python
        env:
          EXPECTED_PYTHON: ${{ matrix.python-version }}
        run: |
          uv run python - <<'PY'
          import os
          import sys

          expected = tuple(map(int, os.environ["EXPECTED_PYTHON"].split(".")))
          assert sys.version_info[:2] == expected, sys.version
          PY

      - name: Run default tests
        run: uv run pytest -q

  release-gate:
    name: Browser and package gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: python
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Python dependencies
        run: uv sync --locked --all-extras --python 3.13

      - name: Verify uv environment Python
        run: |
          uv run python - <<'PY'
          import sys

          assert sys.version_info[:2] == (3, 13), sys.version
          PY

      - name: Verify package metadata version
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          import tomllib

          import pydantic_studio as ps

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          assert pyproject["project"]["version"] == ps.__version__, (
              pyproject["project"]["version"],
              ps.__version__,
          )
          PY

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint Python
        run: uv run ruff check

      - name: Type-check production Python
        run: uv run pyright src/pydantic_studio

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Build frontend bundle
        working-directory: frontend
        run: pnpm build

      - name: Verify committed frontend bundle is current
        run: git diff --exit-code -- src/pydantic_studio/renderers/html/static/dist

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Run browser e2e tests
        run: uv run python -m pytest tests/e2e -p playwright -o "addopts=-ra"

      - name: Build distributions
        run: |
          rm -rf dist
          uv build

      - name: Check distribution metadata
        run: uv run twine check dist/*

      - name: Smoke-test wheel install
        run: |
          rm -rf .dist-smoke-wheel
          python -m venv .dist-smoke-wheel
          .dist-smoke-wheel/bin/python -m pip install dist/*.whl
          .dist-smoke-wheel/bin/pydantic-studio version
          .dist-smoke-wheel/bin/python - <<'PY'
          from importlib import resources

          import pydantic_studio as ps

          assert ps.__version__
          assert resources.files("pydantic_studio").joinpath("py.typed").is_file()
          assert resources.files("pydantic_studio").joinpath(
              "renderers/html/static/dist/index.html"
          ).is_file()
          PY

      - name: Smoke-test source distribution install
        run: |
          rm -rf .dist-smoke-sdist
          python -m venv .dist-smoke-sdist
          .dist-smoke-sdist/bin/python -m pip install dist/*.tar.gz
          .dist-smoke-sdist/bin/pydantic-studio version
          .dist-smoke-sdist/bin/python - <<'PY'
          from importlib import resources

          import pydantic_studio as ps

          assert ps.__version__
          assert resources.files("pydantic_studio").joinpath("py.typed").is_file()
          assert resources.files("pydantic_studio").joinpath(
              "renderers/html/static/dist/index.html"
          ).is_file()
          PY
