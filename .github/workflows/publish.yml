name: Publish packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Python dependencies
        run: uv sync --all-extras --python 3.13

      - name: Verify uv environment Python
        run: |
          uv run python - <<'PY'
          import sys

          assert sys.version_info[:2] == (3, 13), sys.version
          PY

      - name: Verify package metadata version
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          import tomllib

          import pydantic_studio as ps

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          assert pyproject["project"]["version"] == ps.__version__, (
              pyproject["project"]["version"],
              ps.__version__,
          )
          PY

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint Python
        run: uv run ruff check

      - name: Type-check production Python
        run: uv run pyright src/pydantic_studio

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Build frontend bundle
        working-directory: frontend
        run: pnpm build

      - name: Verify committed frontend bundle is current
        run: git diff --exit-code -- src/pydantic_studio/renderers/html/static/dist

      - name: Run default tests
        run: uv run pytest -q

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Run browser e2e tests
        run: uv run python -m pytest tests/e2e -p playwright -o "addopts=-ra"

      - name: Verify tag matches package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(uv run python -c 'import pydantic_studio as ps; print(ps.__version__)')
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (${tag_version}) != package ${pkg_version}"
            exit 1
          fi

      - name: Build distributions
        run: |
          rm -rf dist
          uv build

      - name: Check distribution metadata
        run: uv run twine check dist/*

      - name: Verify distribution release metadata
        run: uv run python scripts/verify_distribution_metadata.py dist

      - name: Smoke-test wheel install
        run: |
          rm -rf .dist-smoke-wheel
          python -m venv .dist-smoke-wheel
          .dist-smoke-wheel/bin/python -m pip install dist/*.whl
          .dist-smoke-wheel/bin/pydantic-studio version
          .dist-smoke-wheel/bin/python - <<'PY'
          from importlib import resources

          import pydantic_studio as ps

          assert ps.__version__
          assert resources.files("pydantic_studio").joinpath("py.typed").is_file()
          assert resources.files("pydantic_studio").joinpath(
              "renderers/html/static/dist/index.html"
          ).is_file()
          PY

      - name: Smoke-test source distribution install
        run: |
          rm -rf .dist-smoke-sdist
          python -m venv .dist-smoke-sdist
          .dist-smoke-sdist/bin/python -m pip install dist/*.tar.gz
          .dist-smoke-sdist/bin/pydantic-studio version
          .dist-smoke-sdist/bin/python - <<'PY'
          from importlib import resources

          import pydantic_studio as ps

          assert ps.__version__
          assert resources.files("pydantic_studio").joinpath("py.typed").is_file()
          assert resources.files("pydantic_studio").joinpath(
              "renderers/html/static/dist/index.html"
          ).is_file()
          PY

      - name: Smoke-test email extra install
        run: |
          rm -rf .dist-smoke-email
          python -m venv .dist-smoke-email
          wheel=$(
            python - <<'PY'
          from pathlib import Path

          wheels = sorted(Path("dist").glob("*.whl"))
          assert len(wheels) == 1, wheels
          print(wheels[0])
          PY
          )
          .dist-smoke-email/bin/python -m pip install "${wheel}[email]"
          .dist-smoke-email/bin/python - <<'PY'
          import email_validator

          assert email_validator
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 30

  publish-pypi:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/pydantic-studio
    permissions:
      id-token: write
    outputs:
      publish-outcome: ${{ steps.publish-pypi.outcome }}
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        id: publish-pypi
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true

      - name: Warn if PyPI publish failed
        if: ${{ steps.publish-pypi.outcome == 'failure' }}
        run: |
          echo "::warning::PyPI publish failed; piesource publish is independent and may still succeed."

  publish-piesource:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    outputs:
      publish-outcome: ${{ steps.publish-piesource.outcome }}
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to piesource
        id: publish-piesource
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
        with:
          repository-url: ${{ secrets.PIESOURCE_REPOSITORY_URL }}
          user: ${{ secrets.PIESOURCE_USERNAME }}
          password: ${{ secrets.PIESOURCE_PASSWORD }}

      - name: Warn if piesource publish failed
        if: ${{ steps.publish-piesource.outcome == 'failure' }}
        run: |
          echo "::warning::piesource publish failed; PyPI publish is independent and may still succeed."

  publish-result:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - publish-pypi
      - publish-piesource
    if: ${{ always() }}
    steps:
      - name: Fail if any registry publish failed
        env:
          PYPI_OUTCOME: ${{ needs.publish-pypi.outputs.publish-outcome }}
          PIESOURCE_OUTCOME: ${{ needs.publish-piesource.outputs.publish-outcome }}
        run: |
          echo "PyPI publish outcome: ${PYPI_OUTCOME}"
          echo "piesource publish outcome: ${PIESOURCE_OUTCOME}"
          if [ "${PYPI_OUTCOME}" != "success" ] || [ "${PIESOURCE_OUTCOME}" != "success" ]; then
            echo "::error::One or more registry publishes failed."
            exit 1
          fi
