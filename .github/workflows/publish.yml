name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest -q

      - name: Verify tag matches package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(uv run python -c "import pydantic_studio; print(pydantic_studio.__version__)")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (parsed as ${tag_version}) does not match package version ${pkg_version}"
            exit 1
          fi

      - name: Build distributions
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        id: publish-pypi
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Warn if PyPI publish failed
        if: ${{ steps.publish-pypi.outcome == 'failure' }}
        run: |
          echo "::warning::PyPI publish failed; piesource publish is independent and may still succeed."

  publish-piesource:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to piesource
        id: publish-piesource
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
        with:
          repository-url: ${{ secrets.PIESOURCE_REPOSITORY_URL }}
          user: ${{ secrets.PIESOURCE_USERNAME }}
          password: ${{ secrets.PIESOURCE_PASSWORD }}

      - name: Warn if piesource publish failed
        if: ${{ steps.publish-piesource.outcome == 'failure' }}
        run: |
          echo "::warning::piesource publish failed; PyPI publish is independent and may still succeed."
