site_name: pydantic-studio
site_description: Interactive editor for Pydantic models
site_url: https://pydantic-studio.example
repo_url: https://github.com/pydantic-studio/pydantic-studio
docs_dir: docs/site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Tutorial: tutorial.md
  - Embedding: embedding.md
  - Architecture: architecture.md
  - CLI: cli.md
  - Examples:
      - examples/index.md
      - Console prompt mode: examples/console-mode.md
      - Root model variants: examples/variant-selection.md
      - Server config: examples/server-config.md
      - Multi-format I/O: examples/multi-format.md
  - API Reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
