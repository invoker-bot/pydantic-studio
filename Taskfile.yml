version: "3"

env:
  UV_PROJECT_ENVIRONMENT: "{{.TASKFILE_DIR}}/.venv"

tasks:
  init:
    desc: Create or update the worktree-local Python development environment.
    cmds:
      - uv sync

  test:
    desc: Run the Python unit test suite.
    cmds:
      - uv run python -m pytest tests/unit -q {{.CLI_ARGS}}

  lint:
    desc: Run Python lint and syntax checks.
    cmds:
      - uv run ruff check {{.CLI_ARGS}}

  clean:
    desc: Remove local build outputs and verification caches.
    cmds:
      - |
        rm -rf \
          build \
          dist \
          site \
          htmlcov \
          .pytest_cache \
          .ruff_cache \
          .mypy_cache \
          .pyright \
          .coverage \
          .coverage.* \
          *.egg-info \
          src/*.egg-info \
          frontend/dist \
          frontend/.vite \
          frontend/.cache \
          frontend/.tscache \
          frontend/*.tsbuildinfo
      - |
        find . \
          \( -path ./.git -o -path ./.venv -o -path ./frontend/node_modules \) -prune \
          -o -type d -name __pycache__ -exec rm -rf {} +
      - |
        find . \
          \( -path ./.git -o -path ./.venv -o -path ./frontend/node_modules \) -prune \
          -o -type f \( -name '*.py[co]' -o -name '*$py.class' \) -delete
